<!doctype html>
<html lang="zh-CN" data-lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Flame Hunter Zhong Kui official teaser page."
    />
    <title>钟馗 | Flame Hunter Zhong Kui</title>
    <link rel="preload" href="./assets/20260423_website_mockup_bg.png" as="image" />
    <link
      rel="preload"
      href="./assets/zk-title-logo-ch.png"
      as="image"
    />
    <link
      rel="preload"
      href="./assets/zk-title-logo-eng.png"
      as="image"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="site-shell" aria-label="Flame Hunter Zhong Kui official website">
      <img
        class="scene-bg"
        src="./assets/20260423_website_mockup_bg.png"
        alt=""
        data-required-asset
      />
      <div class="scene-vignette" aria-hidden="true"></div>

      <header class="site-header" aria-label="Language controls">
        <div class="site-name" aria-hidden="true">Zhong Kui</div>
        <div class="language-switch" role="group" aria-label="Language">
          <button class="language-button is-active" type="button" data-lang="zh">
            中
          </button>
          <button class="language-button" type="button" data-lang="en">EN</button>
        </div>
      </header>

      <section class="title-layer" aria-live="polite">
        <img
          class="language-art logo-art is-active"
          src="./assets/zk-title-logo-ch.png"
          alt="钟馗 即将推出"
          data-lang="zh"
          data-required-asset
        />
        <img
          class="language-art logo-art"
          src="./assets/zk-title-logo-eng.png"
          alt="Flame Hunter Zhong Kui Coming Soon"
          data-lang="en"
          data-required-asset
        />
        <img
          class="language-art soon-art is-active"
          src="./assets/zk-coming-soon-ch.png"
          alt=""
          data-lang="zh"
          data-required-asset
        />
        <img
          class="language-art soon-art"
          src="./assets/zk-coming-soon-eng.png"
          alt=""
          data-lang="en"
          data-required-asset
        />
      </section>

      <p class="asset-warning" role="status">
        素材文件暂未读取到，请把指定图片放入 assets 目录后刷新页面。
      </p>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
